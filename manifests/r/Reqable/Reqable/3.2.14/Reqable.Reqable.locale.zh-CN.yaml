ReleaseNotes: |-
  💪【优化】自动检测`binary/octet-stream`的实际数据类型。
  💪【优化】SOCKS5 代理 DNS 解析使用本地解析而不是强制使用`8.8.8.8`解析服务器。
  💪【优化】粘贴长文本时添加禁止提示。
  💪【优化】工具箱添加正则表达式工具。
  💪【优化】工具箱添加 Unicode 编解码工具。
  🐞【修复】WebSocket 抓包`Sec-WebSocket-Extensions`响应处理不正确的 bug。
  🐞【修复】WebSocket 关闭后状态显示 Aborted 而不是 Completed 的 bug。
  🐞【修复】压缩某些 JSON 字符串会卡死的 bug。
  🐞【修复】调试列表只有一条数据时无法打开详情的 bug。
  🐞【修复】退出应用程序时可能出现 Crash 的 bug。
  🐞【修复】设备二维码扫描成功后自动退出功能无效的 bug。
