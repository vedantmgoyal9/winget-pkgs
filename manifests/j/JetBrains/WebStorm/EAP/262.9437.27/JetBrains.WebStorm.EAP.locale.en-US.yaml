ReleaseNotes: |-
  What's fixed:
  - We've introduced support for Angular standalone component constants with separate declare and export statements (WEB-75812).
  - We've restored Angular inlay hints when using TypeScript Go proxy (WEB-78703).
  - We've fixed an issue with updates within Angular inline templates having no effect on highlighting (WEB-78706).
  - We've fixed a couple of Angular tests when using TypeScript proxy (WEB-78746, WEB-78744, WEB-78739, WEB-78702).
  - We've fixed an issue with the Reformat Code process getting stuck after saving a TypeScript file (WEB-76498).
  - We've fixed the resolution of the @template types when a default value is set in a JSDoc comment (WEB-57879).
  - WebStorm now uses the TypeScript inlay hints implementation instead of LSP inlay hints support to display parameter names, type hints, and other inline annotations (WEB-78724).
  - We've fixed the lateinit property lsp4jServer has not been initialized error in TypeScript (WEB-78848).
  - We've improved the appearance of TypeScript GO parameter information by using getSignatureHelp (WEB-78740).
  - We've fixed the Could not find node in range error that was thrown in TypeScript 7 (Native) files (WEB-78718).
  - We've decoupled JSLanguageServiceHighlightingPass from LSP client caches (WEB-78704).
  - We've fixed a GraphQL introspection failure caused by the getSourceLocation(...) must not be null error (WEB-78663).
  - We've improved mode-aware tsconfig/jsconfig selection for module-import reference resolution and Find Usages (WEB-78526).
  - We've added the Restart Tailwind CSS Service action to Search Everywhere (WEB-78070).
  - We've fixed an issue with references being lost in monorepo projects (WEB-77743).
  - We've disabled the vfs.windows.use.buffered.directory.stream key (IJPL-250709).
  - We've got rid of a IllegalArgumentException in a non-English locale, thus enabling creation of the RemoteRepositoriesConfigurable class (IJPL-245941).
  For more details, please see the release notes.
